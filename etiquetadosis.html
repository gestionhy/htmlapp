<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiqueta Dosificación - Planta Pellegrini</title>
    <style>
        /* Tipografía profesional de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        @page {
            size: A4 landscape;
            margin: 0; /* Cero margen para que el navegador no interfiera */
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
        }

        /* Contenedor Principal Estilo Etiqueta Industrial */
        .etiqueta {
            width: 287mm; 
            height: 195mm;
            background-color: white;
            border: 8px solid #000;
            padding: 15mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Banner Superior (Sin fondo oscuro) */
        .header {
            text-align: center;
            border-bottom: 8px solid #000;
            padding-bottom: 10px;
            margin-bottom: 15mm;
        }

        .header h1 {
            margin: 0;
            font-size: 40pt;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 900;
            color: #000;
        }

        /* Cuerpo de la Etiqueta */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .section {
            border-left: 12px solid #000;
            padding-left: 25px;
        }

        .label {
            display: block;
            font-size: 22pt;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            margin-bottom: 5mm;
        }

        .value {
            font-size: 45pt;
            font-weight: 900;
            color: #000;
            min-height: 1.2em;
            word-wrap: break-word;
            display: flex;
            align-items: flex-end; /* Alinea el texto de BOLSAS con la línea */
        }

        /* Línea para completar a mano */
        .linea-bolsas {
            display: inline-block;
            width: 250px;
            border-bottom: 8px solid #000;
            margin-right: 20px;
            margin-bottom: 8px; /* Levanta la línea un poco respecto a la base del texto */
        }

        /* Ajustes estrictos para que encaje en una sola hoja impresa */
        @media print {
            body { 
                background: none; 
            }
            .etiqueta {
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 15mm;
                border: 8px solid #000;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="etiqueta">
        <div class="header">
            <h1>DOSIFICACIÓN PANIFICADOS</h1>
        </div>

        <div class="content">
            <div class="section">
                <span class="label">Producto</span>
                <div id="producto" class="value">---</div>
            </div>

            <div class="section">
                <span class="label">Cantidad</span>
                <div class="value">
                    <span class="linea-bolsas"></span> BOLSAS
                </div>
            </div>

            <div class="section">
                <span class="label">Fecha de Elaboración</span>
                <div id="fecha" class="value">---</div>
            </div>
        </div>
    </div>

    <script>
        function initEtiqueta() {
            // Captura los datos de la URL generada por AppSheet
            const params = new URLSearchParams(window.location.search);
            const prod = params.get('producto');
            const date = params.get('fecha');

            // Actualiza el HTML si existen los parámetros en la URL
            if (prod) document.getElementById('producto').innerText = prod.toUpperCase();
            if (date) document.getElementById('fecha').innerText = date;

            // Ejecuta el comando de impresión tras un breve delay para renderizado
            setTimeout(() => {
                window.print();
            }, 600);
        }

        window.onload = initEtiqueta;
    </script>
</body>
</html>
